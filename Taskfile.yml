version: '3'

tasks:
  update:
    desc: Tidy Go modules
    cmds:
      - go mod tidy

  fmt:
    desc: Format code
    cmds:
      - go fmt ./...

  vet:
    desc: Run static analysis
    cmds:
      - go vet ./...

  run:
    desc: Build and run the game
    cmds:
      - go run ./cmd/cyberspace

  build:
    desc: Build the binary
    cmds:
      - go build -o bin/cyberspace ./cmd/cyberspace

  test:
    desc: Run tests
    cmds:
      - go test ./...

  lint:
    desc: Run linter
    cmds:
      - golangci-lint run ./...

  sanity:
    desc: Run all checks (fmt, build, test, vet)
    deps:
      - update
      - fmt
      - vet
      - lint
      - test
      - build
